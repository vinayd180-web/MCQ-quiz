<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AV Private Tuitions – Hybrid Education</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;700;900&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        /* ===== ROOT VARIABLES – Web Mode ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --primary:#0a1628; --gold:#d4a843; --gold-light:#f0d080; --gold-gradient:linear-gradient(135deg,#d4a843,#f0d080,#d4a843); --glass-bg:rgba(255,255,255,0.08); --glass-border:rgba(255,255,255,0.15); --shadow:0 20px 60px rgba(0,0,0,0.3); --radius:24px; --radius-sm:14px; --transition:all 0.3s cubic-bezier(0.4,0,0.2,1); --font-serif:'Playfair Display',serif; --font-marathi:'Noto Sans Devanagari',sans-serif; --accent:var(--gold); --accent-light:var(--gold-light); }
        .mobile-mode { --accent:#14b8a6; --accent-light:#5eead4; --gold-gradient:linear-gradient(135deg,#14b8a6,#5eead4,#14b8a6); --gold:#14b8a6; --gold-light:#5eead4; }
        html { scroll-behavior:smooth; }
        body { font-family:'Inter',sans-serif; background:radial-gradient(circle at 10% 20%, #1a2d4a, #0a1628); color:#f0f0f0; min-height:100vh; background-attachment:fixed; overflow-x:hidden; }
        a { text-decoration:none; color:inherit; }
        .hidden { display:none !important; }
        .lang-en { font-family:'Inter',sans-serif; }
        .lang-mr { font-family:var(--font-marathi); }
        .lang-semi { font-family:'Inter',sans-serif; }

        .toast { position:fixed; bottom:2rem; right:2rem; background:rgba(10,22,40,0.92); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.15); color:white; padding:1rem 2rem; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.4); z-index:9999; border-left:4px solid var(--accent); transform:translateY(100px); opacity:0; transition:all 0.5s ease; max-width:400px; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast i { color:var(--accent); margin-right:10px; }

        .navbar { background:rgba(10,22,40,0.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.06); padding:0.5rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; position:sticky; top:0; z-index:1000; }
        .logo { display:flex; align-items:center; gap:0.8rem; }
        .logo svg { height:50px; width:auto; }
        .logo .logo-text { display:flex; flex-direction:column; line-height:1.1; }
        .logo .logo-text .brand { font-family:var(--font-serif); font-size:1.2rem; font-weight:900; color:white; background:var(--gold-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:0.5px; }
        .logo .logo-text .sub { font-size:0.5rem; font-weight:400; color:var(--accent); letter-spacing:3px; -webkit-text-fill-color:var(--accent); font-family:'Inter',sans-serif; margin-top:-2px; text-transform:uppercase; }
        .nav-links { display:flex; align-items:center; gap:0.2rem 1rem; flex-wrap:wrap; }
        .nav-links a { color:rgba(255,255,255,0.6); font-weight:500; font-size:0.8rem; padding:0.3rem 0.5rem; border-radius:6px; transition:var(--transition); display:inline-flex; align-items:center; gap:4px; cursor:pointer; position:relative; }
        .nav-links a:hover, .nav-links a.active { color:white; background:rgba(255,255,255,0.06); }
        .nav-links a.active::after { content:''; position:absolute; bottom:-2px; left:50%; transform:translateX(-50%); width:16px; height:2px; background:var(--accent); border-radius:4px; }
        .lang-switcher { display:flex; gap:0.15rem; background:rgba(255,255,255,0.06); padding:0.1rem; border-radius:60px; border:1px solid rgba(255,255,255,0.06); }
        .lang-btn { padding:0.15rem 0.5rem; border-radius:60px; border:none; background:transparent; color:rgba(255,255,255,0.4); font-weight:600; font-size:0.6rem; cursor:pointer; transition:var(--transition); text-transform:uppercase; }
        .lang-btn.active { background:var(--accent); color:var(--primary); }
        .lang-btn:hover:not(.active) { color:white; }

        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:9998; display:none; align-items:center; justify-content:center; }
        .modal-overlay.active { display:flex; }
        .modal-box { background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:var(--radius); max-width:420px; width:90%; padding:2rem; box-shadow:0 30px 80px rgba(0,0,0,0.4); animation:slideUp 0.3s ease; }
        @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        .modal-box .close { float:right; font-size:1.3rem; cursor:pointer; color:rgba(255,255,255,0.4); transition:var(--transition); }
        .modal-box .close:hover { color:var(--accent); }
        .modal-box h2 { font-family:var(--font-serif); color:var(--accent); text-align:center; margin-bottom:0.3rem; }
        .modal-box .sub { text-align:center; color:rgba(255,255,255,0.5); font-size:0.9rem; margin-bottom:1rem; }

        .btn-gold { background:var(--gold-gradient); color:var(--primary); padding:0.6rem 1.5rem; border-radius:10px; font-weight:700; transition:var(--transition); border:none; cursor:pointer; font-size:0.9rem; }
        .btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,0.3); }
        .btn-outline { background:transparent; border:1.5px solid rgba(255,255,255,0.2); color:white; padding:0.5rem 1.2rem; border-radius:10px; font-weight:500; cursor:pointer; transition:var(--transition); font-size:0.85rem; }
        .btn-outline:hover { background:rgba(255,255,255,0.06); border-color:var(--accent); }
        .btn-secondary { background:#c0392b; color:white; padding:0.5rem 1.2rem; border-radius:10px; font-weight:600; border:none; cursor:pointer; transition:var(--transition); font-size:0.85rem; }
        .btn-secondary:hover { background:#a93226; transform:translateY(-2px); }
        .btn-sm { padding:0.3rem 0.8rem; font-size:0.75rem; border-radius:6px; }

        .input-group { text-align:left; margin-bottom:1rem; }
        .input-group label { font-weight:500; color:rgba(255,255,255,0.7); display:block; margin-bottom:0.2rem; font-size:0.85rem; }
        .input-group input, .input-group select, .input-group textarea { width:100%; padding:0.7rem 1rem; border:1px solid rgba(255,255,255,0.15); border-radius:10px; font-size:0.95rem; transition:var(--transition); background:rgba(255,255,255,0.05); color:white; }
        .input-group input::placeholder, .input-group textarea::placeholder { color:rgba(255,255,255,0.3); }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(212,168,67,0.12); background:rgba(255,255,255,0.08); }
        .input-group select option { background:#0a1628; color:white; }

        .page-container { max-width:1280px; margin:0 auto; padding:1.5rem; }
        .page { display:none; animation:fadeIn 0.4s ease; }
        .page.active { display:block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

        .glass { background:var(--glass-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.5rem; transition:var(--transition); margin-bottom:1.2rem; }
        .glass:hover { transform:translateY(-2px); box-shadow:0 25px 60px rgba(0,0,0,0.35); }
        .glass-premium { background:rgba(255,255,255,0.06); border:1px solid rgba(212,168,67,0.2); }

        .section-title { font-size:1.6rem; font-weight:800; color:white; margin-bottom:1.5rem; display:flex; align-items:center; gap:12px; font-family:var(--font-serif); }
        .section-title i { color:var(--accent); }
        .section-title::after { content:''; flex:1; height:2px; background:linear-gradient(to right, var(--accent), transparent); margin-left:1rem; }

        .grid-2col { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
        .grid-3col { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1.5rem; }
        .grid-4col { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; }
        @media (max-width:768px) { .grid-2col { grid-template-columns:1fr; } .navbar { padding:0.4rem 1rem; } .page-container { padding:1rem; } .logo svg { height:35px; } .logo .logo-text .brand { font-size:1rem; } }

        .stat-card { background:var(--glass-bg); backdrop-filter:blur(8px); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:1.2rem; text-align:center; transition:var(--transition); }
        .stat-card:hover { transform:translateY(-3px); border-color:var(--accent); }
        .stat-card .number { font-size:2rem; font-weight:900; color:var(--accent); display:block; font-family:var(--font-serif); }
        .stat-card .label { color:rgba(255,255,255,0.6); font-weight:500; font-size:0.85rem; }
        .stat-card .icon { font-size:1.6rem; color:var(--accent); margin-bottom:0.2rem; }

        .hero-img { width:100%; height:280px; object-fit:cover; border-radius:var(--radius-sm); margin-bottom:0.8rem; border:1px solid var(--glass-border); }
        .tradition-img { width:100%; height:140px; object-fit:cover; border-radius:var(--radius-sm); margin-bottom:0.5rem; border:2px solid var(--gold); }
        .features-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:0.5rem; list-style:none; padding:0; }
        .features-list li { padding:0.5rem 0.8rem; background:rgba(255,255,255,0.04); border-radius:8px; display:flex; align-items:center; gap:8px; font-weight:500; font-size:0.85rem; border:1px solid rgba(212,168,67,0.06); }
        .features-list li::before { content:'✦'; color:var(--accent); font-weight:700; font-size:0.9rem; }

        .edit-toggle { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999; background:var(--gold-gradient); color:var(--primary); border:none; border-radius:50%; width:48px; height:48px; font-size:1.2rem; cursor:pointer; box-shadow:0 8px 30px rgba(0,0,0,0.3); transition:var(--transition); display:none; align-items:center; justify-content:center; }
        .edit-toggle:hover { transform:scale(1.08); }
        .edit-toggle.active { background:var(--secondary); color:white; }
        .edit-toggle.show { display:flex; }

        .editable-field { position:relative; padding:0.2rem 0.4rem; border-radius:6px; transition:var(--transition); cursor:pointer; }
        .edit-mode .editable-field:hover { background:rgba(212,168,67,0.08); outline:1px dashed var(--accent); }
        .editable-field input, .editable-field textarea { display:none; width:100%; padding:0.3rem 0.6rem; border:1px solid var(--accent); border-radius:6px; background:rgba(10,22,40,0.9); color:white; font-size:inherit; font-family:inherit; }
        .edit-mode .editable-field input, .edit-mode .editable-field textarea { display:block; }
        .edit-mode .editable-field .display-text { display:none; }
        .editable-field .display-text { display:block; }

        .edit-hint { font-size:0.7rem; color:var(--accent); opacity:0.6; font-style:italic; display:none; }
        .edit-mode .edit-hint { display:inline; }
        .add-btn { display:none; }
        .edit-mode .add-btn { display:inline-flex; }

        .contact-number { color:var(--accent); font-weight:600; font-size:1rem; }
        .social-handle { color:var(--gold-light); font-weight:500; }
        .social-handle i { margin-right:4px; }
        .text-muted { color:rgba(255,255,255,0.5); }
        .text-center { text-align:center; }
        .flex { display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap; }
        .flex-center { display:flex; align-items:center; justify-content:center; gap:0.8rem; flex-wrap:wrap; }
        .mt-1 { margin-top:0.8rem; }
        .mt-2 { margin-top:1.5rem; }

        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-top:0.8rem; }
        .gallery-item { position:relative; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--glass-border); background:rgba(255,255,255,0.03); aspect-ratio:1/1; }
        .gallery-item img, .gallery-item video { width:100%; height:100%; object-fit:cover; display:block; }
        .gallery-item .del-btn { position:absolute; top:6px; right:6px; background:rgba(192,57,43,0.85); color:white; border:none; border-radius:50%; width:26px; height:26px; cursor:pointer; font-size:0.7rem; transition:var(--transition); display:none; align-items:center; justify-content:center; }
        .gallery-item .del-btn:hover { transform:scale(1.1); background:var(--secondary); }
        .edit-mode .gallery-item .del-btn { display:flex; }
        .gallery-item .type-badge { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,0.6); color:white; padding:0.1rem 0.5rem; border-radius:4px; font-size:0.55rem; font-weight:600; text-transform:uppercase; }

        .result-card { background:var(--glass-bg); backdrop-filter:blur(8px); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:1rem; text-align:center; transition:var(--transition); }
        .result-card:hover { transform:translateY(-3px); border-color:var(--accent); }
        .result-card img { width:60px; height:60px; border-radius:50%; object-fit:cover; border:2px solid var(--gold); margin:0 auto 0.5rem; display:block; background:#2a3d5a; }
        .result-card .name { font-weight:700; font-size:1rem; color:white; }
        .result-card .percent { color:var(--accent); font-weight:900; font-size:1.2rem; }
        .result-card .jump { color:var(--gold-light); font-size:0.8rem; }

        .mcq-question { background:rgba(255,255,255,0.04); padding:0.8rem 1rem; border-radius:10px; margin-bottom:0.8rem; border-left:3px solid var(--accent); }
        .mcq-question .options label { display:block; padding:0.2rem 0; cursor:pointer; color:rgba(255,255,255,0.75); font-size:0.9rem; }
        .mcq-question .options input[type="radio"] { margin-right:8px; accent-color:var(--accent); }
        .badge { background:var(--accent); color:var(--primary); padding:0.15rem 0.6rem; border-radius:60px; font-size:0.6rem; font-weight:700; text-transform:uppercase; display:inline-block; }

        .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(10,22,40,0.95); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.06); padding:6px 0; z-index:100; justify-content:space-around; }
        .bottom-nav .nav-item { display:flex; flex-direction:column; align-items:center; color:rgba(255,255,255,0.4); font-size:0.55rem; gap:2px; cursor:pointer; padding:4px 8px; background:none; border:none; transition:all 0.2s; }
        .bottom-nav .nav-item i { font-size:1.2rem; color:rgba(255,255,255,0.4); transition:all 0.2s; }
        .bottom-nav .nav-item.active i, .bottom-nav .nav-item.active { color:var(--accent); }

        .mobile-menu { position:fixed; top:0; left:-280px; width:280px; height:100%; background:rgba(10,22,40,0.98); backdrop-filter:blur(12px); border-right:1px solid rgba(255,255,255,0.06); transition:all 0.3s ease; z-index:1000; padding:20px 0; overflow-y:auto; }
        .mobile-menu.open { left:0; }
        .mobile-menu .menu-header { padding:0 20px 20px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:10px; }
        .mobile-menu .menu-header .brand { font-family:var(--font-serif); font-size:1.2rem; color:var(--accent); }
        .mobile-menu .menu-item { display:flex; align-items:center; gap:14px; padding:12px 20px; color:rgba(255,255,255,0.7); transition:all 0.2s; cursor:pointer; border-left:3px solid transparent; background:none; border-right:none; border-top:none; border-bottom:1px solid rgba(255,255,255,0.03); width:100%; font-size:0.9rem; }
        .mobile-menu .menu-item:hover, .mobile-menu .menu-item.active { color:white; background:rgba(255,255,255,0.05); border-left-color:var(--accent); }
        .mobile-menu .menu-item i { width:24px; color:var(--accent); text-align:center; }
        .mobile-menu .menu-item .badge { margin-left:auto; background:var(--secondary); color:white; padding:2px 8px; border-radius:60px; font-size:0.6rem; }
        .menu-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; display:none; }
        .menu-overlay.active { display:block; }
        .hamburger { display:none; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer; padding:8px; }
        .mobile-mode .hamburger { display:block; }
        .mobile-mode .desktop-nav { display:none; }
        .mobile-mode .page-container { padding-bottom:80px; }
        .mobile-mode .glass { padding:1rem; }
        .mobile-mode .hero-img { height:180px; }
        .mobile-mode .section-title { font-size:1.2rem; }
        .mobile-mode .grid-4col { grid-template-columns:repeat(2,1fr); }
        .mobile-mode .features-list { grid-template-columns:1fr; }
        .mobile-mode .bottom-nav { display:flex; }
        .desktop-nav { display:flex; align-items:center; gap:1rem; }
        .desktop-nav a { color:rgba(255,255,255,0.7); padding:0.3rem 0.5rem; border-radius:6px; transition:var(--transition); font-size:0.8rem; }
        .desktop-nav a:hover, .desktop-nav a.active { color:white; background:rgba(255,255,255,0.06); }
        .mode-toggle-btn { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); padding:4px 12px; border-radius:60px; font-size:0.7rem; cursor:pointer; transition:var(--transition); }
        .mode-toggle-btn:hover { background:rgba(255,255,255,0.1); color:white; }

        .testimonial-card { background:var(--glass-bg); backdrop-filter:blur(8px); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:1.5rem; text-align:center; transition:var(--transition); }
        .testimonial-card:hover { transform:translateY(-4px); border-color:var(--accent); }
        .testimonial-card .avatar { width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid var(--gold); margin:0 auto 0.5rem; display:block; background:#2a3d5a; }
        .testimonial-card .name { font-weight:700; color:var(--accent); }
        .testimonial-card .course { font-size:0.8rem; opacity:0.6; }
        .testimonial-card .quote { font-style:italic; font-size:0.95rem; margin-top:0.5rem; opacity:0.8; }

        .map-container { border-radius:12px; overflow:hidden; border:2px solid var(--accent); margin:1rem 0; }
        .map-container iframe { width:100%; height:250px; border:none; display:block; }
    </style>
</head>
<body>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMessage">Success!</span></div>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar" id="mainNav">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
                <circle cx="100" cy="100" r="95" fill="none" stroke="#d4a843" stroke-width="3"/>

                <line x1="150" y1="95" x2="100" y2="65" stroke="#d4a843" stroke-width="2"/>
                <path d="M100 150 L100 130" stroke="#22c55e" stroke-width="3"/>
                <path d="M100 130 C90 120, 80 110, 85 100" stroke="#22c55e" stroke-width="3" fill="none"/>
                <path d="M100 130 C110 120, 120 110, 115 100" stroke="#22c55e" stroke-width="3" fill="none"/>
                <ellipse cx="85" cy="100" rx="8" ry="5" fill="#22c55e" transform="rotate(-30, 85, 100)"/>
                <ellipse cx="115" cy="100" rx="8" ry="5" fill="#22c55e" transform="rotate(30, 115, 100)"/>
                <ellipse cx="100" cy="90" rx="6" ry="4" fill="#4ade80" transform="rotate(0, 100, 90)"/>
                <circle cx="70" cy="70" r="6" fill="#d4a843" opacity="0.7"/>
                <circle cx="130" cy="70" r="6" fill="#d4a843" opacity="0.7"/>
                <line x1="70" y1="70" x2="130" y2="70" stroke="#d4a843" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
                <circle cx="60" cy="85" r="3" fill="#d4a843" opacity="0.4"/>
                <circle cx="140" cy="85" r="3" fill="#d4a843" opacity="0.4"/>
            </svg>
            <div class="logo-text">
                <span class="brand">AV Private Tuitions</span>
                <span class="sub">✦ Hybrid Education ✦</span>
            </div>
        </div>
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="desktop-nav" id="desktopNav">
            <a data-page="home" class="active">Home</a>
            <a data-page="about">About</a>
            <a data-page="courses">Courses</a>
            <a data-page="results">Results</a>

        async function ensureDefaultUser(email, password, name, role) {
            try {

                await auth.signInWithEmailAndPassword(email, password);
                await auth.signOut(); // sign out immediately
                console.log(`✅ Default user already exists: ${email}`);
                return;
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    // User doesn't exist – create them
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await db.collection('users').doc(cred.user.uid).set({
                            name,
                            email,
                            role,
                            created: Date.now()
                        });
                        await auth.signOut();
                        console.log(`✅ Created default user: ${email} (${role})`);
                    } catch (createError) {
                        console.warn('⚠️ Could not create default user:', createError.message);
