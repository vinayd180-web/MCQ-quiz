<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AV Pro – Coaching Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #0a1628;
            --gold: #d4a843;
            --gold-light: #f0d080;
            --gold-gradient: linear-gradient(135deg, #d4a843, #f0d080);
            --green: #22c55e;
            --coral: #ef4444;
            --sky: #3b82f6;
            --purple: #8b5cf6;
            --peach: #f59e0b;
            --pink: #ec4899;
            --teal: #14b8a6;
            --radius: 16px;
            --radius-sm: 10px;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .navbar-left { display: flex; align-items: center; gap: 10px; }
        .navbar .logo-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--gold); }
        .navbar .logo-text {
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: Georgia, serif;
            cursor: pointer;
        }
        .navbar-right { display: flex; align-items: center; gap: 8px; }
        .navbar .theme-toggle { background: none; border: none; font-size: 1.2rem; color: var(--text); cursor: pointer; padding: 4px 8px; }
        .navbar .user-badge { font-size: 0.7rem; background: var(--gold); color: #fff; padding: 2px 10px; border-radius: 60px; font-weight: 600; }
        .navbar .dev-badge { font-size: 0.6rem; background: var(--coral); color: #fff; padding: 2px 8px; border-radius: 60px; font-weight: 700; display: none; }
        .navbar .notification-bell { position: relative; background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; padding: 4px; }
        .navbar .notification-bell .badge-count { position: absolute; top: -4px; right: -4px; background: var(--coral); color: #fff; font-size: 0.6rem; font-weight: 700; border-radius: 50%; padding: 2px 6px; min-width: 18px; text-align: center; }

        .page-container { padding-bottom: 70px; }
        .page { display: none; padding: 1rem 1rem 1.5rem; animation: fadeUp 0.25s ease; }
        .page.active { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { background: var(--card-bg); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 1rem; box-shadow: var(--shadow); border: 1px solid rgba(0, 0, 0, 0.04); }
        .card-gold { border-left: 4px solid var(--gold); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.7rem 1.2rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            touch-action: manipulation;
        }
        .btn-primary { background: var(--gold-gradient); color: #fff; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); }
        .btn-danger { background: var(--coral); color: #fff; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; width: auto; }

        .input-group { margin-bottom: 0.8rem; }
        .input-group label { display: block; font-weight: 600; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 0.7rem 0.8rem;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
            font-family: var(--font);
        }
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 1rem; }
        .login-card { width: 100%; max-width: 380px; background: var(--card-bg); border-radius: var(--radius); padding: 2rem 1.5rem; box-shadow: var(--shadow); }
        .login-card .icon { font-size: 2.8rem; text-align: center; display: block; margin-bottom: 0.2rem; }
        .login-card h2 { font-family: Georgia, serif; text-align: center; font-size: 1.4rem; }
        .login-card .sub { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }

        .bottom-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 0 8px;
            z-index: 999;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
        }
        .bottom-tabs .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.55rem;
            color: var(--text-muted);
            padding: 2px 8px;
            border: none;
            background: none;
            cursor: pointer;
            touch-action: manipulation;
            min-width: 44px;
            transition: color 0.2s;
        }
        .bottom-tabs .tab i { font-size: 1.3rem; margin-bottom: 1px; }
        .bottom-tabs .tab.active { color: var(--gold); }
        .bottom-tabs .tab:active { transform: scale(0.9); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 9999; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); border-radius: var(--radius); max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .modal .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--gold); }
        .modal .modal-header h3 { font-family: Georgia, serif; color: var(--gold); }
        .modal .modal-close { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card-bg);
            color: var(--text);
            padding: 0.7rem 1.2rem;
            border-radius: var(--radius-sm);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            border-left: 4px solid var(--gold);
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 90%;
            font-size: 0.85rem;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .hidden { display: none !important; }
        .text-link { color: var(--gold); font-weight: 600; cursor: pointer; }
        .mt-2 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 1rem; }
        .flex { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .text-muted { color: var(--text-muted); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMessage">Success!</span></div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> Developer Settings</h3>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div id="settingsPasswordPrompt">
                <p class="text-muted mb-2">Enter developer password:</p>
                <div class="input-group">
                    <input type="password" id="settingsPasswordInput" placeholder="Enter password..." />
                </div>
                <button class="btn btn-primary" onclick="verifySettingsPassword()"><i class="fas fa-unlock"></i> Unlock</button>
                <p id="settingsPasswordError" class="text-muted" style="color:var(--coral);margin-top:0.5rem;display:none;">❌ Incorrect password</p>
            </div>
            <div id="settingsContent" style="display:none;">
                <div class="input-group"><label>Firebase API Key</label><input type="text" id="setApiKey" /></div>
                <div class="input-group"><label>Auth Domain</label><input type="text" id="setAuthDomain" /></div>
                <div class="input-group"><label>Project ID</label><input type="text" id="setProjectId" /></div>
                <div class="input-group"><label>Storage Bucket</label><input type="text" id="setStorageBucket" /></div>
                <div class="input-group"><label>Messaging Sender ID</label><input type="text" id="setMessagingSenderId" /></div>
                <div class="input-group"><label>App ID</label><input type="text" id="setAppId" /></div>
                <div class="flex mt-2" style="justify-content:flex-end;gap:0.5rem;">
                    <button class="btn btn-primary" onclick="saveSettings()" style="width:auto;"><i class="fas fa-save"></i> Save</button>
                    <button class="btn btn-outline" onclick="closeSettings()" style="width:auto;">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-left">
            <img id="navLogo" class="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23d4a843'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' text-anchor='middle' fill='white'%3EAV%3C/text%3E%3C/svg%3E" alt="Logo" />
            <span class="logo-text" id="navTitle">AV Pro</span>
        </div>
        <div class="navbar-right">
            <span class="dev-badge" id="devBadge">🔧 DEV</span>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <span id="userBadge" class="user-badge hidden">Guest</span>
        </div>
    </nav>

    <!-- PAGE CONTAINER -->
    <div class="page-container">
        <!-- LOGIN PAGE -->
        <div id="loginPage" class="page active">
            <div class="login-wrapper">
                <div class="login-card">
                    <span class="icon" id="loginIcon">🌱</span>
                    <h2 id="loginTitle">AV Pro</h2>
                    <p class="sub" id="loginSub">Sign in to access your dashboard</p>
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="input-group"><label>Email</label><input type="email" id="loginEmail" required /></div>
                        <div class="input-group"><label>Password</label><input type="password" id="loginPassword" required /></div>
                        <div id="loginError" class="hidden" style="color:var(--coral);margin-bottom:0.5rem;"></div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</button>
                        <p style="margin-top:0.8rem;font-size:0.75rem;opacity:0.5;text-align:center;">
                            Don't have an account? <span class="text-link" onclick="toggleSignup()">Sign Up</span>
                        </p>
                        <p style="margin-top:0.4rem;font-size:0.65rem;opacity:0.3;text-align:center;">
                            <span class="text-link" onclick="openDeveloperSettings()">🔧 Developer Settings</span>
                        </p>
                    </form>
                    <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
                        <div class="input-group"><label>Full Name</label><input type="text" id="signupName" required /></div>
                        <div class="input-group"><label>Email</label><input type="email" id="signupEmail" required /></div>
                        <div class="input-group"><label>Password</label><input type="password" id="signupPassword" required /></div>
                        <div class="input-group"><label>Role</label>
                            <select id="signupRole">
                                <option value="student">Student</option>
                                <option value="teacher">Teacher</option>
                                <option value="parent">Parent</option>
                            </select>
                        </div>
                        <div id="signupError" class="hidden" style="color:var(--coral);margin-bottom:0.5rem;"></div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-user-plus"></i> Sign Up</button>
                        <p style="margin-top:0.8rem;font-size:0.75rem;opacity:0.5;text-align:center;">
                            Already have an account? <span class="text-link" onclick="toggleSignup()">Sign In</span>
                        </p>
                    </form>
                </div>
            </div>
        </div>

        <!-- HOME PAGE -->
        <div id="homePage" class="page">
            <div style="padding: 1rem;">
                <h1 style="font-family: Georgia, serif; color: var(--gold); margin-bottom: 1rem;">Welcome to AV Pro</h1>
                <div class="card">
                    <p>Welcome, <strong id="userName">User</strong>!</p>
                    <p style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Role: <span id="userRole">Student</span></p>
                </div>
                <button class="btn btn-danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM TAB BAR -->
    <div class="bottom-tabs" id="bottomTabs"></div>

    <script>
        // ============================================================
        // FIREBASE CONFIGURATION
        // ============================================================
        const DEFAULT_CONFIG = {
            apiKey: "AIzaSyACnqjnq2VFIX17pSoiNMNxy77WlWBgeWs",
            authDomain: "av-private-tuitions.firebaseapp.com",
            projectId: "av-private-tuitions",
            storageBucket: "av-private-tuitions.firebasestorage.app",
            messagingSenderId: "254111465995",
            appId: "1:254111465995:web:89f3e1f7b1d2fb0bb67d0e"
        };

        const DEVELOPER_PASSWORD = "admin@AV2024";

        let auth, db, storage;
        let currentUser = null;
        let userRole = 'student';
        let settingsUnlocked = false;
        let currentFirebaseConfig = { ...DEFAULT_CONFIG };

        // ============================================================
        // INITIALIZE FIREBASE
        // ============================================================
        function initFirebase(config) {
            try {
                if (firebase.apps.length) {
                    firebase.apps.forEach(app => app.delete());
                }
                firebase.initializeApp(config);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
                db.enablePersistence().catch(err => console.warn('Persistence error:', err));
                console.log('✅ Firebase initialized successfully');
                return true;
            } catch (e) {
                console.error('❌ Firebase init error:', e);
                showToast('Firebase initialization failed. Check console.');
                return false;
            }
        }

        // ============================================================
        // AUTHENTICATION FUNCTIONS
        // ============================================================
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    currentUser = userCredential.user;
                    loadUserData();
                    showPage('homePage');
                    showToast('✅ Logged in successfully!');
                })
                .catch(error => {
                    console.error('Login error:', error);
                    document.getElementById('loginError').textContent = error.message;
                    document.getElementById('loginError').classList.remove('hidden');
                });
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const role = document.getElementById('signupRole').value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    currentUser = userCredential.user;
                    userRole = role;
                    saveUserData(name, role);
                    showPage('homePage');
                    showToast('✅ Account created successfully!');
                })
                .catch(error => {
                    console.error('Signup error:', error);
                    document.getElementById('signupError').textContent = error.message;
                    document.getElementById('signupError').classList.remove('hidden');
                });
        }

        function handleLogout() {
            auth.signOut()
                .then(() => {
                    currentUser = null;
                    userRole = 'student';
                    showPage('loginPage');
                    document.getElementById('loginForm').reset();
                    document.getElementById('signupForm').reset();
                    showToast('✅ Logged out successfully!');
                })
                .catch(error => {
                    console.error('Logout error:', error);
                    showToast('Error logging out');
                });
        }

        // ============================================================
        // USER DATA FUNCTIONS
        // ============================================================
        function saveUserData(name, role) {
            if (!currentUser) return;
            
            db.collection('users').doc(currentUser.uid).set({
                name: name,
                email: currentUser.email,
                role: role,
                createdAt: new Date(),
                lastLogin: new Date()
            }, { merge: true })
            .then(() => {
                console.log('✅ User data saved');
            })
            .catch(error => {
                console.error('Error saving user data:', error);
            });
        }

        function loadUserData() {
            if (!currentUser) return;
            
            db.collection('users').doc(currentUser.uid).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        userRole = data.role || 'student';
                        document.getElementById('userName').textContent = data.name || 'User';
                        document.getElementById('userRole').textContent = userRole;
                    } else {
                        document.getElementById('userName').textContent = currentUser.email;
                        document.getElementById('userRole').textContent = userRole;
                    }
                })
                .catch(error => console.error('Error loading user data:', error));
        }

        // ============================================================
        // UI FUNCTIONS
        // ============================================================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function toggleSignup() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('signupForm').classList.toggle('hidden');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // SETTINGS FUNCTIONS
        // ============================================================
        function openDeveloperSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
            settingsUnlocked = false;
            document.getElementById('settingsPasswordPrompt').style.display = 'block';
            document.getElementById('settingsContent').style.display = 'none';
            document.getElementById('settingsPasswordInput').value = '';
        }

        function verifySettingsPassword() {
            const pwd = document.getElementById('settingsPasswordInput').value;
            if (pwd === DEVELOPER_PASSWORD) {
                settingsUnlocked = true;
                document.getElementById('settingsPasswordPrompt').style.display = 'none';
                document.getElementById('settingsContent').style.display = 'block';
                loadSettingsForm();
            } else {
                document.getElementById('settingsPasswordError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('settingsPasswordError').style.display = 'none';
                }, 3000);
            }
        }

        function loadSettingsForm() {
            document.getElementById('setApiKey').value = currentFirebaseConfig.apiKey || '';
            document.getElementById('setAuthDomain').value = currentFirebaseConfig.authDomain || '';
            document.getElementById('setProjectId').value = currentFirebaseConfig.projectId || '';
            document.getElementById('setStorageBucket').value = currentFirebaseConfig.storageBucket || '';
            document.getElementById('setMessagingSenderId').value = currentFirebaseConfig.messagingSenderId || '';
            document.getElementById('setAppId').value = currentFirebaseConfig.appId || '';
        }

        function saveSettings() {
            currentFirebaseConfig = {
                apiKey: document.getElementById('setApiKey').value,
                authDomain: document.getElementById('setAuthDomain').value,
                projectId: document.getElementById('setProjectId').value,
                storageBucket: document.getElementById('setStorageBucket').value,
                messagingSenderId: document.getElementById('setMessagingSenderId').value,
                appId: document.getElementById('setAppId').value
            };
            
            localStorage.setItem('av_firebase_config', JSON.stringify(currentFirebaseConfig));
            showToast('✅ Settings saved! Reinitialize Firebase for changes to take effect.');
        }

        // ============================================================
        // THEME TOGGLE
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase(currentFirebaseConfig);

            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', () => {
                const html = document.documentElement;
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });

            // Load saved theme
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Auth state listener
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    loadUserData();
                    showPage('homePage');
                } else {
                    currentUser = null;
                    showPage('loginPage');
                }
            });
        });
    </script>
</body>
</html>
