<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MCQ Test Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    h1, h2 {
      text-align: center;
    }

    .option {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e9ecef;
      font-size: 16px;
    }

    .selected {
      background: #90caf9;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #timer {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>MCQ Test Pro</h1>
  <div id="timer">05:00</div>
  <div id="quiz">Loading...</div>
  <button class="submit-btn" onclick="submitQuiz()">Submit</button>
  <h2 id="result"></h2>
</div>

<script>
let questions = [];
let selectedAnswers = {};
let timeLeft = 300;

fetch("http://192.168.0.110:3000/questions")
  .then(res => res.json())
  .then(data => {
    questions = data;
    renderQuiz();
  })
  .catch(() => {
    document.getElementById("quiz").innerHTML = "Cannot connect to server.";
  });

function renderQuiz() {
  let html = "";

  questions.forEach((q, i) => {
    html += `<div class="card">`;
    html += `<h3>${i + 1}. ${q.question}</h3>`;

    q.options.forEach(option => {
      let selected = selectedAnswers[i] === option ? "selected" : "";
      html += `
        <button class="option ${selected}" 
          onclick="selectAnswer(${i}, '${option}')">
          ${option}
        </button>
      `;
    });

    html += `</div>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function selectAnswer(questionIndex, answer) {
  selectedAnswers[questionIndex] = answer;
  renderQuiz();
}

function submitQuiz() {
  let score = 0;

  questions.forEach((q, i) => {
    if (selectedAnswers[i] === q.answer) score++;
  });

  document.getElementById("result").innerText =
    `Score: ${score} / ${questions.length}`;
}

setInterval(() => {
  if (timeLeft <= 0) {
    submitQuiz();
    return;
  }

  timeLeft--;

  let min = Math.floor(timeLeft / 60);
  let sec = timeLeft % 60;

  document.getElementById("timer").innerText =
    `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
}, 1000);
</script>
</body>
</html>
